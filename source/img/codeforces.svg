<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codeforces icon light theme</title>
  <desc id="desc">Three rounded vertical bars in gold, blue, and coral optimized for light theme.</desc>
  <defs>
    <linearGradient id="goldLight" x1="118" y1="184" x2="118" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6C94E"/>
      <stop offset="1" stop-color="#E0A100"/>
    </linearGradient>
    <linearGradient id="blueLight" x1="256" y1="64" x2="256" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31A0F6"/>
      <stop offset="1" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="redLight" x1="394" y1="224" x2="394" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6E5B"/>
      <stop offset="1" stop-color="#EE4F45"/>
    </linearGradient>
  </defs>

  <rect x="63" y="184" width="110" height="248" rx="55" fill="url(#goldLight)"/>
  <rect x="201" y="64" width="110" height="368" rx="55" fill="url(#blueLight)"/>
  <rect x="339" y="224" width="110" height="208" rx="55" fill="url(#redLight)"/>
</svg>
