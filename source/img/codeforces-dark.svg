<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codeforces icon dark theme</title>
  <desc id="desc">Three rounded vertical bars in gold, blue, and coral optimized for dark theme.</desc>
  <defs>
    <linearGradient id="goldDark" x1="118" y1="184" x2="118" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD250"/>
      <stop offset="1" stop-color="#F0AD19"/>
    </linearGradient>
    <linearGradient id="blueDark" x1="256" y1="64" x2="256" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#57B5FF"/>
      <stop offset="1" stop-color="#2A86F7"/>
    </linearGradient>
    <linearGradient id="redDark" x1="394" y1="224" x2="394" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7E68"/>
      <stop offset="1" stop-color="#FF5646"/>
    </linearGradient>
  </defs>

  <rect x="63" y="184" width="110" height="248" rx="55" fill="url(#goldDark)"/>
  <rect x="201" y="64" width="110" height="368" rx="55" fill="url(#blueDark)"/>
  <rect x="339" y="224" width="110" height="208" rx="55" fill="url(#redDark)"/>
